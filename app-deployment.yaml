
apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-track
  namespace: os-stogops-wrk
  labels:
    app.kubernetes.io/name: real-track
    app.kubernetes.io/instance: real-track
    app.kubernetes.io/managed-by: operative
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: real-track
      app.kubernetes.io/instance: real-track
  template:
    metadata:
      labels:
        app.kubernetes.io/name: real-track
        app.kubernetes.io/instance: real-track
        app.kubernetes.io/managed-by: operative
        app.kubernetes.io/component: backend
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: real-track
        image: us-central1-docker.pkg.dev/operative-001/os-stogops/os/stogops/real-track:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: track-data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: track-data
        persistentVolumeClaim:
          claimName: real-track-pvc
